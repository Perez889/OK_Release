name: OK影视自动更新

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时检查一次
  workflow_dispatch:        # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 更新到 v4 更稳定

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Detect latest version (from reliable GitHub source)
        run: |
          # 优先使用 GitHub youhunwl/TVAPP 仓库（可靠、公开）
          GITHUB_BASE="https://github.com/youhunwl/TVAPP/raw/refs/heads/main/%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86"
          
          # 可选 fallback 到 Workers（但不推荐，因为不列目录）
          # WORKERS_BASE="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88"
          
          BASE="$GITHUB_BASE"   # 默认用 GitHub
          
          echo "开始从 GitHub 源探测 OK影视标准版最新版本 (3.x 系列)..."
          LATEST="3.0.0"
          BEST_SIZE=0
          
          for minor in {0..9}; do
            for patch in {0..9}; do
              V="3.${minor}.${patch}"
              declare -a TEST_FILES=(
                "OK影视-电视版-${V}.apk"
                "leanback-arm64_v8a-${V}.apk"
                "海信专版-OK影视-${V}.apk"
              )
              
              for TEST_FILE in "${TEST_FILES[@]}"; do
                URL="${BASE}/${TEST_FILE}"
                echo "检查: $V → $TEST_FILE ($URL)"
                
                STATUS=$(curl -s -I --max-time 10 --retry 2 -w "%{http_code}" -o /dev/null "$URL")
                
                if [ "$STATUS" = "200" ]; then
                  SIZE=$(curl -sI --max-time 10 "$URL" | grep -i '^Content-Length:' | awk '{print $2}' | tr -d '\r')
                  SIZE=${SIZE:-0}
                  
                  if [ "$SIZE" -gt 1000000 ]; then   # >1MB 为有效 APK
                    echo "有效发现：$V ($TEST_FILE, 大小约 $((SIZE/1024/1024)) MB)"
                    if [ "$SIZE" -gt "$BEST_SIZE" ]; then
                      LATEST="$V"
                      BEST_SIZE="$SIZE"
                    fi
                    break  # 找到一个即可，不用检查更多文件
                  fi
                fi
              done
            done
          done
          
          if [ "$LATEST" = "3.0.0" ]; then
            echo "未找到任何有效 3.x APK，可能是源变更或网络问题。退出。"
            exit 1
          fi
          
          echo "最新版本认定：$LATEST"
          echo "$LATEST" > latest_version.txt
          echo "LATEST_VERSION=$LATEST" >> $GITHUB_ENV

      - name: Compare with last version
        run: |
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            echo "上次记录版本：$LAST"
            if [ "$LAST" = "$LATEST_VERSION" ]; then
              echo "版本无变化，退出 workflow。"
              exit 0
            else
              echo "发现新版本：$LATEST_VERSION （旧版 $LAST）"
            fi
          else
            echo "首次运行，无上次版本记录，继续更新。"
          fi

      - name: Download APK files
        run: |
          # 使用相同的 BASE 下载
          BASE_URL="${GITHUB_BASE}/"   # GitHub raw 不需要版本子目录，文件直接放根下或子文件夹
          
          mkdir -p downloads
          cd downloads
          
          declare -a FILES=(
            "OK影视-电视版-$LATEST_VERSION.apk"
            "leanback-arm64_v8a-$LATEST_VERSION.apk"
            "leanback-armeabi_v7a-$LATEST_VERSION.apk"
            "mobile-arm64_v8a-$LATEST_VERSION.apk"
            "mobile-armeabi_v7a-$LATEST_VERSION.apk"
            "海信专版-OK影视-$LATEST_VERSION.apk"
          )
          
          DOWNLOADED_COUNT=0
          for f in "${FILES[@]}"; do
            FILE_URL="${BASE_URL}${f}"
            echo "尝试下载: $f 从 $FILE_URL"
            if wget --timeout=15 --tries=3 -q -O "$f" "$FILE_URL" && [ -s "$f" ]; then
              echo "成功: $f"
              ((DOWNLOADED_COUNT++))
            else
              echo "失败或空文件: $f （跳过）"
              rm -f "$f"
            fi
          done
          
          if [ $DOWNLOADED_COUNT -eq 0 ]; then
            echo "没有下载到任何有效 APK，退出。"
            exit 1
          fi
          
          echo "共下载 $DOWNLOADED_COUNT 个 APK 文件"

      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads
          
          if ls *.apk >/dev/null 2>&1; then
            MESSAGE="📢 OK影视标准版 新版本发布！\n版本：${LATEST_VERSION}\n来源：GitHub youhunwl/TVAPP\n更新日志：暂无（可手动查看仓库）\n\n已上传安装包："
            for f in *.apk; do
              MESSAGE="$MESSAGE\n- $f"
            done
            
            curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHANNEL_ID" \
              -d text="$MESSAGE" \
              -d parse_mode="Markdown"
            
            for f in *.apk; do
              curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
                -F chat_id="$TELEGRAM_CHANNEL_ID" \
                -F document=@"$f" \
                -F caption="$f\nOK影视标准版 $LATEST_VERSION"
            done
          else
            echo "无 APK 文件，跳过 Telegram 上传"
          fi

      - name: Save new version and commit
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add last_version.txt
          git commit -m "自动更新：OK影视标准版到 $LATEST_VERSION" || echo "无实际变更，跳过 commit"
          git push || echo "推送失败（可能无变更或权限问题）"
