name: OK影视自动更新

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq opencc

      - name: Detect latest version
        run: |
          BASE="https://op.ll.dovx.cf/OK影视/OK影视标准版"

          START_MAJOR=3
          START_MINOR=7
          START_PATCH=0

          LATEST_VERSION=""
          FOUND_FIRST="false"

          for PATCH in $(seq $START_PATCH 20); do
            VERSION="${START_MAJOR}.${START_MINOR}.${PATCH}"
            URL="${BASE}/${VERSION}/标准版${VERSION}.txt"

            CONTENT=$(curl -s "$URL")

            if [ -n "$CONTENT" ]; then
              LATEST_VERSION="$VERSION"
              FOUND_FIRST="true"
            else
              if [ "$FOUND_FIRST" = "true" ]; then
                break
              fi
            fi
          done

          if [ -z "$LATEST_VERSION" ]; then
            echo "未找到版本"
            exit 1
          fi

          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "$LATEST_VERSION" > latest_version.txt

      - name: Compare version
        id: check
        run: |
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            if [ "$LAST" = "$LATEST_VERSION" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: 获取并解析更新日志
        if: steps.check.outputs.changed == 'true'
        run: |
          LOG_URL="https://op.ll.dovx.cf/OK影视/OK影视标准版/${LATEST_VERSION}/标准版${LATEST_VERSION}.txt"

          raw_log=$(curl -s "$LOG_URL")

          if [ -z "$raw_log" ]; then
            raw_log="暂无更新日志"
          fi

          merged_logs=$(echo "$raw_log" \
            | sed 's/^\* //g' \
            | sed '/^$/d' \
            | sort | uniq \
            | sed 's/^/• /g' \
            | opencc -c t2s.json)

          update_time=$(TZ=Asia/Shanghai date '+%Y/%m/%d %H:%M')

          caption=$(
            printf "📢 OK影视更新发布\n\n- 本次更新：\n%s\n\n- 当前版本：%s\n- 更新时间：%s" \
              "$merged_logs" "$LATEST_VERSION" "$update_time"
          )

          {
            echo "caption<<EOF"
            echo "$caption"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Download APK files
        if: steps.check.outputs.changed == 'true'
        run: |
          BASE="https://op.ll.dovx.cf/OK影视/OK影视标准版/$LATEST_VERSION/"
          mkdir -p apk
          cd apk

          wget -q "${BASE}海信专版-OK影视-$LATEST_VERSION.apk" -O hisense-tv-customized-ok.apk
          wget -q "${BASE}leanback-arm64_v8a-$LATEST_VERSION.apk" -O leanback-arm64_v8a-ok.apk
          wget -q "${BASE}leanback-armeabi_v7a-$LATEST_VERSION.apk" -O leanback-armeabi_v7a-ok.apk
          wget -q "${BASE}mobile-arm64_v8a-$LATEST_VERSION.apk" -O mobile-arm64_v8a-ok.apk
          wget -q "${BASE}mobile-armeabi_v7a-$LATEST_VERSION.apk" -O mobile-armeabi_v7a-ok.apk

      - name: 推送到 Telegram（caption 在最后）
        if: steps.check.outputs.changed == 'true'
        env:
          BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:     ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BOT_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
        run: |
          set -e

          if [ -z "${caption+x}" ]; then
            echo "caption 变量不存在"
            exit 1
          fi

          for f in \
            "hisense-tv-customized-ok.apk" \
            "leanback-arm64_v8a-ok.apk" \
            "leanback-armeabi_v7a-ok.apk" \
            "mobile-arm64_v8a-ok.apk" \
            "mobile-armeabi_v7a-ok.apk"; do
            if [ ! -f "apk/$f" ]; then
              echo "缺少文件 apk/$f"
              exit 1
            fi
          done

          media_json=$(jq -cn \
            --arg cap "$caption" \
            '[
              {"type":"document","media":"attach://hisense-tv-customized-ok.apk"},
              {"type":"document","media":"attach://leanback-arm64_v8a-ok.apk"},
              {"type":"document","media":"attach://leanback-armeabi_v7a-ok.apk"},
              {"type":"document","media":"attach://mobile-arm64_v8a-ok.apk"},
              {"type":"document","media":"attach://mobile-armeabi_v7a-ok.apk","caption":$cap}
            ]')

          response=$(curl -s -X POST "$BOT_API_BASE/bot$BOT_TOKEN/sendMediaGroup" \
            -F chat_id="$CHAT_ID" \
            -F media="$media_json" \
            -F "hisense-tv-customized-ok.apk=@apk/hisense-tv-customized-ok.apk" \
            -F "leanback-arm64_v8a-ok.apk=@apk/leanback-arm64_v8a-ok.apk" \
            -F "leanback-armeabi_v7a-ok.apk=@apk/leanback-armeabi_v7a-ok.apk" \
            -F "mobile-arm64_v8a-ok.apk=@apk/mobile-arm64_v8a-ok.apk" \
            -F "mobile-armeabi_v7a-ok.apk=@apk/mobile-armeabi_v7a-ok.apk")

          echo "Telegram 响应: $response"

          if echo "$response" | grep -q '"ok":true'; then
            echo "Telegram 推送成功"
          else
            echo "Telegram 推送失败"
            exit 1
          fi

      - name: Save new version
        if: steps.check.outputs.changed == 'true'
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "更新版本号到 $LATEST_VERSION" || echo "无变更"
          git push || echo "无需推送"
