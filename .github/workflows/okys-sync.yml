name: OK影视标准版 - 下载指定版本并推送Telegram

on:
  workflow_dispatch:
    inputs:
      version:
        description: '请输入版本号 (如 3.7.0)'
        required: true
        default: '3.7.0'

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置版本并检查是否新
        id: set_ver
        run: |
          VER="${{ inputs.version }}"
          echo "处理版本: $VER"

          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
          else
            LAST="0.0.0"
          fi

          if [[ "$VER" > "$LAST" ]]; then
            echo "是新版本，将下载并推送"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "版本 $VER 不新于上次 $LAST，跳过"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

          echo "ver=$VER" >> $GITHUB_OUTPUT

      - name: 下载 5 个 APK
        if: steps.set_ver.outputs.should_run == 'true'
        env:
          VER: ${{ steps.set_ver.outputs.ver }}
        run: |
          BASE_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$VER/"

          declare -A files=(
            ["hisense"]="海信专版-OK影视-${VER}.apk"
            ["leanback_arm64"]="leanback-arm64_v8a-${VER}.apk"
            ["leanback_armeabi"]="leanback-armeabi_v7a-${VER}.apk"
            ["mobile_arm64"]="mobile-arm64_v8a-${VER}.apk"
            ["mobile_armeabi"]="mobile-armeabi_v7a-${VER}.apk"
          )

          mkdir -p apks
          count=0

          for key in "${!files[@]}"; do
            fname="${files[$key]}"
            url="${BASE_URL}${fname}"
            echo "下载 $key → $url"
            if curl -s -o /dev/null -w "%{http_code}" "$url" | grep -q "200"; then
              curl -L --retry 3 -o "apks/${key}.apk" "$url"
              ((count++))
            else
              echo "文件不存在或无法访问: $fname"
            fi
          done

          if [ $count -lt 3 ]; then
            echo "只下载到 $count 个文件，退出"
            exit 1
          fi

          # 重命名海信专版
          [ -f "apks/hisense.apk" ] && mv "apks/hisense.apk" "apks/hisense-tv-customized-${VER}.apk"

      - name: 尝试获取更新日志
        if: steps.set_ver.outputs.should_run == 'true'
        env:
          VER: ${{ steps.set_ver.outputs.ver }}
        run: |
          BASE_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$VER/"
          LOGS="• 本次更新：版本升级到 $VER （源站未提供详细日志）"

          # 尝试常见日志文件名
          for log in "标准版${VER}.txt" "update.txt" "changelog.txt" "更新日志.txt"; do
            if curl -s -o changelog.txt "${BASE_URL}${log}" && [ -s changelog.txt ]; then
              sed 's/^[ \t-•*]*//; s/^/• /' changelog.txt | grep -v '^$' > cleaned.txt
              LOGS=$(cat cleaned.txt)
              break
            fi
          done

          {
            echo "logs<<EOF"
            echo "$LOGS"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: 推送至 Telegram
        if: steps.set_ver.outputs.should_run == 'true'
        env:
          VER: ${{ steps.set_ver.outputs.ver }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          LOGS: ${{ env.logs }}
        run: |
          UPDATE_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')

          caption=$(cat << EOF

OK影视 标准版 · $VER 更新推送

本次更新：
$LOGS

当前版本：$VER
更新时间：$UPDATE_TIME 北京时间
EOF
          )

          APK_FILES=$(ls apks/*.apk 2>/dev/null | sort | tr '\n' ' ')
          [ -z "$APK_FILES" ] && { echo "无apk文件"; exit 1; }

          curl -s --fail-with-body \
            -F chat_id="$CHAT_ID" \
            -F disable_notification=true \
            $(for f in $APK_FILES; do echo -n "-F document=@$f "; done) \
            -F caption="$caption" \
            https://api.telegram.org/bot"$BOT_TOKEN"/sendDocument || {
              echo "Telegram发送失败"
              exit 1
            }

      - name: 更新版本记录
        if: steps.set_ver.outputs.should_run == 'true'
        run: |
          echo "${{ steps.set_ver.outputs.ver }}" > last_version.txt
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_version.txt
          git commit -m "更新版本记录: ${{ steps.set_ver.outputs.ver }}" || echo "无变化"
          git push --quiet

      - name: 清理
        if: always()
        run: rm -rf apks *.txt index.html || true
