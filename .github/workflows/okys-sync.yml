name: OK影视自动更新

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Fetch version from update.txt
        run: |
          CHANGELOG_URL="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/update.txt"

          echo "获取 update.txt..."
          curl -s "$CHANGELOG_URL" -o update.txt

          VERSION=$(grep -oP '\d+\.\d+\.\d+' update.txt | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "无法从 update.txt 获取版本号，退出"
            exit 1
          fi

          echo "最新版本号：$VERSION"
          echo "$VERSION" > latest_version.txt
          echo "LATEST_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compare version
        run: |
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            echo "上次版本：$LAST"
            echo "本次版本：$LATEST_VERSION"

            if [ "$LAST" = "$LATEST_VERSION" ]; then
              echo "版本未变化，退出。"
              exit 0
            fi
          fi

          echo "版本变化，继续执行..."

      - name: Download APK files
        run: |
          BASE_URL="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$LATEST_VERSION/"
          mkdir -p downloads
          cd downloads

          declare -a FILES=(
            "海信专版-OK影视-$LATEST_VERSION.apk"
            "leanback-arm64_v8a-$LATEST_VERSION.apk"
            "leanback-armeabi_v7a-$LATEST_VERSION.apk"
            "mobile-arm64_v8a-$LATEST_VERSION.apk"
            "mobile-armeabi_v7a-$LATEST_VERSION.apk"
          )

          for f in "${FILES[@]}"; do
            echo "下载 $f"
            wget -q "${BASE_URL}${f}"
          done

      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads

          MESSAGE="📢 OK影视 新版本发布\n版本：${LATEST_VERSION}\n\n更新日志：\n$(cat ../update.txt)"

          curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHANNEL_ID" \
            -d text="$MESSAGE"

          for f in *.apk; do
            curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHANNEL_ID" \
              -F document=@"$f" \
              -F caption="$f"
          done

      - name: Save new version
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "更新版本号到 $LATEST_VERSION" || echo "无变更"
          git push || echo "无需推送"
