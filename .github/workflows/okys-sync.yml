name: OK影视标准版 - 自动下载并推送到Telegram

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟检查，可改 */10 测试
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装必要工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: 获取目录列表并确定最新版本
        id: get_latest
        run: |
          curl -s --max-time 15 "https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/" > index.html || { echo "无法访问根目录"; exit 1; }

          # 提取所有 x.y.z 版本号（纯文本匹配）
          versions=$(grep -oP '\b\d+\.\d+\.\d+\b' index.html | sort -Vu)

          latest_version=$(echo "$versions" | tail -n 1)
          if [ -z "$latest_version" ]; then
            echo "未提取到版本号，页面预览："
            head -n 40 index.html
            exit 1
          fi

          echo "提取到的版本（旧→新）："
          echo "$versions"
          echo "最新版本: $latest_version"

          last_version=$(cat last_version.txt 2>/dev/null || echo "0.0.0")
          echo "上次版本: $last_version"

          if [[ "$latest_version" > "$last_version" ]]; then
            echo "new_version=$latest_version" >> $GITHUB_OUTPUT
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: 下载 5 个 APK 并重命名
        if: steps.get_latest.outputs.has_update == 'true'
        env:
          VER: ${{ steps.get_latest.outputs.new_version }}
        run: |
          BASE_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$VER/"

          declare -A patterns=(
            ["hisense"]="海信专版-OK影视-${VER}.apk"
            ["leanback_arm64"]="leanback-arm64_v8a-${VER}.apk"
            ["leanback_armeabi"]="leanback-armeabi_v7a-${VER}.apk"
            ["mobile_arm64"]="mobile-arm64_v8a-${VER}.apk"
            ["mobile_armeabi"]="mobile-armeabi_v7a-${VER}.apk"
          )

          mkdir -p apks
          downloaded=0

          for key in "${!patterns[@]}"; do
            file="${patterns[$key]}"
            full_url="${BASE_URL}${file}"
            echo "尝试下载 $key: $full_url"
            if curl -s --head --max-time 10 "$full_url" | grep -q "200 OK"; then
              curl -L --retry 3 --max-time 60 -o "apks/${key}.apk" "$full_url" && ((downloaded++))
            else
              echo "文件不存在: $file"
            fi
          done

          if [ $downloaded -lt 3 ]; then
            echo "下载文件太少 ($downloaded 个)，子目录预览："
            curl -s "$BASE_URL" | head -n 40
            exit 1
          fi

          # 重命名海信专版
          [ -f "apks/hisense.apk" ] && mv "apks/hisense.apk" "apks/hisense-tv-customized-${VER}.apk"

      - name: 尝试获取更新日志
        if: steps.get_latest.outputs.has_update == 'true'
        env:
          VER: ${{ steps.get_latest.outputs.new_version }}
        run: |
          BASE_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$VER/"
          logs="• 本次更新：版本升级到 $VER （源站未提供详细更新日志）"

          # 尝试找任何 txt/md/log 文件（可选扩展）
          log_candidate=$(curl -s "$BASE_URL" | grep -i -oP '[^ ]*\.(txt|md|log)' | head -n 1 || true)
          if [ -n "$log_candidate" ]; then
            curl -s "${BASE_URL}${log_candidate}" > changelog.txt
            if [ -s changelog.txt ]; then
              sed 's/^[ \t]*[-*•]\?[ \t]*/• /; s/^[ \t]*//; /^$/d' changelog.txt > cleaned.txt
              logs=$(cat cleaned.txt)
            fi
          fi

          echo "logs<<EOF" >> $GITHUB_ENV
          echo "$logs" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 发送到 Telegram 频道
        if: steps.get_latest.outputs.has_update == 'true'
        env:
          VER: ${{ steps.get_latest.outputs.new_version }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          LOGS: ${{ env.logs }}
        run: |
          TZ=Asia/Shanghai
          UPDATE_TIME=$(date '+%Y-%m-%d %H:%M')

          caption=$(printf '%s\n\n%s\n\n%s\n\n%s\n%s\n' \
            "OK影视 标准版 · $VER 更新推送" \
            "本次更新：" \
            "$LOGS" \
            "当前版本：$VER" \
            "更新时间：$UPDATE_TIME 北京时间")

          echo "$caption"

          APK_FILES=$(ls apks/*.apk 2>/dev/null | tr '\n' ' ')
          [ -z "$APK_FILES" ] && exit 1

          curl --fail-with-body -s \
            -F chat_id="$CHAT_ID" \
            -F disable_notification=true \
            $(for f in $APK_FILES; do echo -n "-F document=@$f "; done) \
            -F caption="$caption" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" || exit 1

      - name: 更新版本记录
        if: steps.get_latest.outputs.has_update == 'true'
        run: |
          echo "${{ steps.get_latest.outputs.new_version }}" > last_version.txt
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_version.txt
          git commit -m "更新最新版本: ${{ steps.get_latest.outputs.new_version }}" || echo "无变化"
          git push --quiet

      - name: 清理
        if: always()
        run: rm -rf apks index.html changelog.txt cleaned.txt || true
