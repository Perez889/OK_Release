name: OK影视自动更新

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip jq opencc curl

      - name: 下载 APK 并生成更新日志
        run: python3 scripts/fetch_apk.py

      - name: 检查是否有更新
        id: check
        run: |
          if [ -f last_version.txt ]; then
            LAST_STD=$(grep "^Std:" last_version.txt | cut -d':' -f2)
            LAST_PRO=$(grep "^Pro:" last_version.txt | cut -d':' -f2)
            LATEST_STD=$(grep "^Std:" latest_version.txt | cut -d':' -f2)
            LATEST_PRO=$(grep "^Pro:" latest_version.txt | cut -d':' -f2)
            if [ "$LAST_STD" = "$LATEST_STD" ] && [ "$LAST_PRO" = "$LATEST_PRO" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: 推送标准版到 Telegram
        if: steps.check.outputs.changed == 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BOT_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
        run: |
          cd apk
          media='[
            {"type":"document","media":"attach://hisense-tv-universal-ok.apk"},
            {"type":"document","media":"attach://leanback-arm64_v8a-ok.apk"},
            {"type":"document","media":"attach://leanback-armeabi_v7a-ok.apk"},
            {"type":"document","media":"attach://mobile-arm64_v8a-ok.apk"},
            {"type":"document","media":"attach://mobile-armeabi_v7a-ok.apk","caption":"'"$(cat ../caption.txt | jq -R .)"'"}
          ]'
          response=$(curl -s -X POST "$BOT_API_BASE/bot$BOT_TOKEN/sendMediaGroup" \
            -F chat_id="$CHAT_ID" \
            -F media="$media" \
            -F "hisense-tv-universal-ok.apk=@hisense-tv-universal-ok.apk" \
            -F "leanback-arm64_v8a-ok.apk=@leanback-arm64_v8a-ok.apk" \
            -F "leanback-armeabi_v7a-ok.apk=@leanback-armeabi_v7a-ok.apk" \
            -F "mobile-arm64_v8a-ok.apk=@mobile-arm64_v8a-ok.apk" \
            -F "mobile-armeabi_v7a-ok.apk=@mobile-armeabi_v7a-ok.apk")
          echo "Telegram 响应: $response"

      - name: 推送 Pro 版到 Telegram
        if: steps.check.outputs.changed == 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BOT_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
        run: |
          cd apk
          media='[
            {"type":"document","media":"attach://leanback-armeabi_v7a-pro.apk"},
            {"type":"document","media":"attach://leanback-arm64_v8a-pro.apk"},
            {"type":"document","media":"attach://mobile-armeabi_v7a-pro.apk"},
            {"type":"document","media":"attach://mobile-arm64_v8a-pro.apk","caption":"'"$(cat ../caption.txt | jq -R .)"'"}
          ]'
          response=$(curl -s -X POST "$BOT_API_BASE/bot$BOT_TOKEN/sendMediaGroup" \
            -F chat_id="$CHAT_ID" \
            -F media="$media" \
            -F "leanback-armeabi_v7a-pro.apk=@leanback-armeabi_v7a-pro.apk" \
            -F "leanback-arm64_v8a-pro.apk=@leanback-arm64_v8a-pro.apk" \
            -F "mobile-armeabi_v7a-pro.apk=@mobile-armeabi_v7a-pro.apk" \
            -F "mobile-arm64_v8a-pro.apk=@mobile-arm64_v8a-pro.apk")
          echo "Telegram 响应: $response"

      - name: 保存版本号
        if: steps.check.outputs.changed == 'true'
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "update $(cat latest_version.txt)" || true
          git push || true
