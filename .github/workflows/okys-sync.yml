name: OK影视自动更新

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Fetch version list from source site
        run: |
          # 源站目录（必须用源站，因为 Worker 无法代理目录）
          BASE_URL_SRC="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88"

          echo "获取目录列表..."
          curl -s "$BASE_URL_SRC" -o list.html

          # 提取版本号目录（例如 3.7.0）
          grep -oP '(?<=href=")[0-9]+\.[0-9]+\.[0-9]+(?=")' list.html > versions.txt

          echo "发现版本目录："
          cat versions.txt

          LATEST_VERSION=$(sort -V versions.txt | tail -n 1)
          echo "最新版本目录：$LATEST_VERSION"

          echo "$LATEST_VERSION" > latest_version.txt
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Compare version
        run: |
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            if [ "$LAST" = "$LATEST_VERSION" ]; then
              echo "版本未变化，退出。"
              exit 0
            fi
          fi

      - name: Download APK files via Worker
        run: |
          # Worker 代理（用于下载文件）
          BASE_URL_WORKER="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$LATEST_VERSION/"
          mkdir -p downloads
          cd downloads

          declare -a FILES=(
            "海信专版-OK影视-$LATEST_VERSION.apk"
            "leanback-arm64_v8a-$LATEST_VERSION.apk"
            "leanback-armeabi_v7a-$LATEST_VERSION.apk"
            "mobile-arm64_v8a-$LATEST_VERSION.apk"
            "mobile-armeabi_v7a-$LATEST_VERSION.apk"
          )

          for f in "${FILES[@]}"; do
            echo "下载 $f"
            wget -q "${BASE_URL_WORKER}${f}"
          done

      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads

          MESSAGE="📢 OK影视 新版本发布\n版本：${LATEST_VERSION}\n\n更新日志：无（未提供）"

          curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHANNEL_ID" \
            -d text="$MESSAGE"

          for f in *.apk; do
            curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHANNEL_ID" \
              -F document=@"$f" \
              -F caption="$f"
          done

      - name: Save new version
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "更新版本号到 $LATEST_VERSION" || echo "无变更"
          git push || echo "无需推送"
