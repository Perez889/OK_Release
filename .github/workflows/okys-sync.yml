      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads

          # 1. 获取 OK 影视 txt 更新日志
          TXT_URL="https://op.ll.dovx.cf/OK影视/OK影视标准版/${LATEST_VERSION}/标准版${LATEST_VERSION}.txt"
          echo "获取更新日志：$TXT_URL"

          if ! curl -s -f "$TXT_URL" -o changelog.txt; then
            echo "获取更新日志失败，使用默认文案"
            echo "暂无更新说明（txt 获取失败）" > changelog.txt
          fi

          changelog=$(cat changelog.txt)
          update_time=$(TZ=Asia/Shanghai date '+%Y/%m/%d %H:%M')

          caption=$(
            printf "📢 OK影视 新版本发布\n\n- 当前版本：%s\n- 更新时间：%s\n\n📄 更新内容：\n%s" \
              "$LATEST_VERSION" "$update_time" "$changelog"
          )

          echo "Caption:"
          echo "$caption"

          # 2. 准备文件列表
          files=( *.apk )
          total=${#files[@]}

          # 3. 构造 sendMediaGroup 的 media JSON，caption 只放在最后一个
          media_json="["
          for i in "${!files[@]}"; do
            f="${files[$i]}"
            attach_name="file$((i+1))"

            if [ "$i" -eq $((total - 1)) ]; then
              # 最后一个文件带 caption
              media_json+='{"type":"document","media":"attach://'"$attach_name"'","caption":"'"'"$caption"'"'" }'
            else
              # 前面的文件不带 caption
              media_json+='{"type":"document","media":"attach://'"$attach_name"'"}'
            fi

            if [ "$i" -lt $((total - 1)) ]; then
              media_json+=","
            fi
          done
          media_json+="]"

          echo "media_json = $media_json"

          # 4. 发送媒体组
          curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMediaGroup" \
            -F chat_id="$TELEGRAM_CHANNEL_ID" \
            -F media="$media_json" \
          $(for i in "${!files[@]}"; do
              f="${files[$i]}"
              attach_name="file$((i+1))"
              printf ' -F %s=@%s' "$attach_name" "$f"
            done)
