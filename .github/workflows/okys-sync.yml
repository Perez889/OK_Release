name: OK影视标准版 - 下载指定版本并推送 Telegram (支持自建API)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入版本号 (如 3.7.0)'
        required: true
        default: '3.7.0'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: 检查版本是否新
        id: check
        run: |
          VER="${{ inputs.version }}"
          echo "处理版本: $VER"

          LAST=$(cat last_version.txt 2>/dev/null || echo "0.0.0")
          if [[ "$VER" > "$LAST" ]]; then
            echo "new_version=$VER" >> $GITHUB_OUTPUT
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "版本不新，跳过"
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: 下载 APK 和日志
        if: steps.check.outputs.run == 'true'
        env:
          VER: ${{ steps.check.outputs.new_version }}
        run: |
          BASE="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$VER/"

          mkdir -p apks

          APKS=(
            "海信专版-OK影视-${VER}.apk hisense"
            "leanback-arm64_v8a-${VER}.apk leanback_arm64"
            "leanback-armeabi_v7a-${VER}.apk leanback_armeabi"
            "mobile-arm64_v8a-${VER}.apk mobile_arm64"
            "mobile-armeabi_v7a-${VER}.apk mobile_armeabi"
          )

          for entry in "${APKS[@]}"; do
            file=$(echo $entry | cut -d' ' -f1)
            key=$(echo $entry | cut -d' ' -f2)
            url="${BASE}${file}"
            curl -L --retry 3 --max-time 60 -o "apks/${key}.apk" "$url" || echo "下载失败: $file"
          done

          [ -f "apks/hisense.apk" ] && mv "apks/hisense.apk" "apks/hisense-tv-customized-${VER}.apk"

          curl -s -o changelog.txt "${BASE}标准版${VER}.txt" || echo "无日志"

      - name: 处理日志
        if: steps.check.outputs.run == 'true'
        env:
          VER: ${{ steps.check.outputs.new_version }}
        run: |
          LOGS="• 本次更新：版本 $VER （无详细日志）"

          if [ -s changelog.txt ]; then
            sed 's/^/• /' changelog.txt | grep -v '^$' > cleaned.txt
            LOGS=$(cat cleaned.txt)
          fi

          echo "logs<<EOF" >> $GITHUB_ENV
          echo "$LOGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 推送 Telegram (支持自建 API base)
        if: steps.check.outputs.run == 'true'
        env:
          VER: ${{ steps.check.outputs.new_version }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          API_BASE: ${{ secrets.TELEGRAM_API_BASE }}   # <--- 新变量！自建服务器的 base URL
          LOGS: ${{ env.logs }}
        run: |
          UPDATE_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')

          caption=$(printf '%s\n\n%s\n\n%s\n\n%s\n%s\n' \
            "OK影视 标准版 · $VER 更新推送" \
            "本次更新：" \
            "$LOGS" \
            "当前版本：$VER" \
            "更新时间：$UPDATE_TIME 北京时间")

          echo "$caption"

          APK_FILES=$(ls apks/*.apk 2>/dev/null | tr '\n' ' ')
          [ -z "$APK_FILES" ] && exit 1

          # 使用自定义 API base（如果没设，默认用官方）
          API_URL="${API_BASE:-https://api.telegram.org}"
          FULL_URL="${API_URL}/bot${BOT_TOKEN}/sendDocument"

          curl --fail-with-body -s \
            -F chat_id="$CHAT_ID" \
            -F disable_notification=true \
            $(for f in $APK_FILES; do echo -n "-F document=@$f "; done) \
            -F caption="$caption" \
            "$FULL_URL" || {
              echo "发送失败，检查 token / ID / API_BASE"
              exit 1
            }

      - name: 更新记录
        if: steps.check.outputs.run == 'true'
        run: |
          echo "${{ steps.check.outputs.new_version }}" > last_version.txt
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_version.txt
          git commit -m "推送 $VER" || echo "无变化"
          git push --quiet

      - name: 清理
        if: always()
        run: rm -rf apks changelog.txt cleaned.txt || true
