name: OKеҪұи§ҶиҮӘеҠЁжӣҙж–°

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Detect latest version folder
        run: |
          BASE_URL="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/"

          echo "иҺ·еҸ–зүҲжң¬зӣ®еҪ•еҲ—иЎЁ..."
          curl -s "$BASE_URL" -o list.html

          # жҸҗеҸ–зүҲжң¬зӣ®еҪ•пјҲдҫӢеҰӮ 3.7.0пјү
          grep -oP '(?<=href=")[0-9]+\.[0-9]+\.[0-9]+(?=/")' list.html > versions.txt

          echo "еҸ‘зҺ°зүҲжң¬зӣ®еҪ•пјҡ"
          cat versions.txt

          LATEST_VERSION=$(sort -V versions.txt | tail -n 1)
          echo "жңҖж–°зүҲжң¬зӣ®еҪ•пјҡ$LATEST_VERSION"

          echo "$LATEST_VERSION" > latest_version.txt
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Compare version
        run: |
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            if [ "$LAST" = "$LATEST_VERSION" ]; then
              echo "зүҲжң¬жңӘеҸҳеҢ–пјҢйҖҖеҮәгҖӮ"
              exit 0
            fi
          fi

      - name: Fetch APK list
        run: |
          VERSION_URL="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$LATEST_VERSION/"
          mkdir -p downloads

          echo "иҺ·еҸ– APK еҲ—иЎЁ..."
          curl -s "$VERSION_URL" -o list.html

          grep -oP '(?<=href=")[^"]+\.apk' list.html > apk_list.txt

          grep -E "жө·дҝЎдё“зүҲ|leanback-arm64_v8a|leanback-armeabi_v7a|mobile-arm64_v8a|mobile-armeabi_v7a" apk_list.txt > final_list.txt

          echo "жңҖз»Ҳ APK еҲ—иЎЁпјҡ"
          cat final_list.txt

      - name: Download APK files
        run: |
          VERSION_URL="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$LATEST_VERSION/"
          cd downloads

          while read -r file; do
            echo "дёӢиҪҪ $file"
            wget -q "${VERSION_URL}${file}"
          done < ../final_list.txt

      - name: Fetch changelog
        run: |
          CHANGELOG_URL="https://jolly-morning-15a8.wuethan89.workers.dev/OK%E5%BD%B1%E8%A7%86/update.txt"
          curl -s "$CHANGELOG_URL" -o update.txt || echo "ж— жӣҙж–°ж—Ҙеҝ—"

      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads

          MESSAGE="рҹ“ў OKеҪұи§Ҷ ж–°зүҲжң¬еҸ‘еёғ\nзүҲжң¬пјҡ${LATEST_VERSION}\n\nжӣҙж–°ж—Ҙеҝ—пјҡ\n$(cat ../update.txt 2>/dev/null || echo 'ж— ')"

          curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHANNEL_ID" \
            -d text="$MESSAGE"

          for f in *.apk; do
            curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHANNEL_ID" \
              -F document=@"$f" \
              -F caption="$f"
          done

      - name: Save new version
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "жӣҙж–°зүҲжң¬еҸ·еҲ° $LATEST_VERSION" || echo "ж— еҸҳжӣҙ"
          git push || echo "ж— йңҖжҺЁйҖҒ"
