name: OK影视自动更新

on:
  schedule:
    - cron: "0 */6 * * *"   # 每 6 小时检查一次
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Fetch latest directory
        run: |
          mkdir -p downloads
          BASE_URL="https://op.ll.dovx.cf/OK影视/OK影视标准版/"

          echo "获取目录列表..."
          curl -s "$BASE_URL" -o list.html

          # 提取 APK 链接
          grep -oP '(?<=href=")[^"]+\.apk' list.html > apk_list.txt

          # 只保留你需要的 5 个
          grep -E "海信专版|leanback-arm64_v8a|leanback-armeabi_v7a|mobile-arm64_v8a|mobile-armeabi_v7a" apk_list.txt > final_list.txt

      - name: Extract version & changelog
        run: |
          curl -s "https://op.ll.dovx.cf/OK影视/update.txt" -o update.txt || true

          VERSION=$(grep -oP '\d+\.\d+\.\d+' update.txt | head -n 1)
          echo "最新版本：$VERSION"

          echo "$VERSION" > latest_version.txt

          # 如果仓库里有旧版本文件，则比较
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            echo "上次版本：$LAST"

            if [ "$LAST" = "$VERSION" ]; then
              echo "版本未变化，退出。"
              exit 0
            fi
          fi

          echo "版本变化，继续执行..."

      - name: Download APK files
        run: |
          BASE_URL="https://op.ll.dovx.cf/OK影视/OK影视标准版/"
          cd downloads

          while read -r file; do
            echo "下载 $file"
            wget -q "${BASE_URL}${file}"
          done < ../final_list.txt

      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads

          MESSAGE="📢 OK影视 新版本发布\n版本：${VERSION}\n\n更新日志：\n$(cat ../update.txt 2>/dev/null || echo '无')"

          curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHANNEL_ID" \
            -d text="$MESSAGE"

          for f in *.apk; do
            curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHANNEL_ID" \
              -F document=@"$f" \
              -F caption="$f"
          done

      - name: Save new version
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "更新版本号到 $VERSION" || echo "无变更"
          git push || echo "无需推送"
