name: OK影视标准版 - 下载指定版本并推送 Telegram

on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入最新版本号（如 3.7.0，从浏览器查看根目录得到）'
        required: true
        default: '3.7.0'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: 检查是否新版本
        id: check
        run: |
          VER="${{ inputs.version }}"
          echo "处理版本: $VER"

          LAST=$(cat last_version.txt 2>/dev/null || echo "0.0.0")
          if [[ "$VER" > "$LAST" ]]; then
            echo "new_version=$VER" >> $GITHUB_OUTPUT
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "版本 $VER 不大于上次 $LAST，跳过推送"
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: 下载 APK 和日志
        if: steps.check.outputs.run == 'true'
        env:
          VER: ${{ steps.check.outputs.new_version }}
        run: |
          BASE="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$VER/"

          mkdir -p apks logs

          # 下载 5 个核心 APK
          APKS=(
            "海信专版-OK影视-${VER}.apk hisense"
            "leanback-arm64_v8a-${VER}.apk leanback_arm64"
            "leanback-armeabi_v7a-${VER}.apk leanback_armeabi"
            "mobile-arm64_v8a-${VER}.apk mobile_arm64"
            "mobile-armeabi_v7a-${VER}.apk mobile_armeabi"
          )

          for entry in "${APKS[@]}"; do
            file=$(echo $entry | cut -d' ' -f1)
            key=$(echo $entry | cut -d' ' -f2)
            url="${BASE}${file}"
            echo "下载 $key: $url"
            curl -L --retry 3 --max-time 60 -o "apks/${key}.apk" "$url" || echo "失败: $file"
          done

          # 重命名海信专版
          [ -f "apks/hisense.apk" ] && mv "apks/hisense.apk" "apks/hisense-tv-customized-${VER}.apk"

          # 下载日志（优先标准版3.7.0.txt）
          curl -s -o "logs/changelog.txt" "${BASE}标准版${VER}.txt" || echo "无日志文件"

      - name: 处理日志并构建 caption
        if: steps.check.outputs.run == 'true'
        env:
          VER: ${{ steps.check.outputs.new_version }}
        run: |
          LOGS="• 本次更新：版本 $VER （源站日志文件内容或未找到）"

          if [ -s logs/changelog.txt ]; then
            sed 's/^[ \t]*[-*•]\?[ \t]*/• /; s/^[ \t]*//; /^$/d' logs/changelog.txt > cleaned.txt
            LOGS=$(cat cleaned.txt)
          fi

          echo "logs<<EOF" >> $GITHUB_ENV
          echo "$LOGS"
          echo "EOF" >> $GITHUB_ENV

      - name: 推送 Telegram
        if: steps.check.outputs.run == 'true'
        env:
          VER: ${{ steps.check.outputs.new_version }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          LOGS: ${{ env.logs }}
        run: |
          UPDATE_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')

          caption=$(printf '%s\n\n%s\n\n%s\n\n%s\n%s\n' \
            "OK影视 标准版 · $VER 更新推送" \
            "本次更新：" \
            "$LOGS" \
            "当前版本：$VER" \
            "更新时间：$UPDATE_TIME 北京时间")

          echo "$caption"

          APK_FILES=$(ls apks/*.apk 2>/dev/null | tr '\n' ' ')
          [ -z "$APK_FILES" ] && { echo "无 APK"; exit 1; }

          curl --fail-with-body -s \
            -F chat_id="$CHAT_ID" \
            -F disable_notification=true \
            $(for f in $APK_FILES; do echo -n "-F document=@$f "; done) \
            -F caption="$caption" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" || exit 1

      - name: 更新记录
        if: steps.check.outputs.run == 'true'
        run: |
          echo "${{ steps.check.outputs.new_version }}" > last_version.txt
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_version.txt
          git commit -m "推送版本: ${{ steps.check.outputs.new_version }}" || echo "无变化"
          git push --quiet

      - name: 清理
        if: always()
        run: rm -rf apks logs *.txt || true
