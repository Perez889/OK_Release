name: OK影视自动更新

on:
  workflow_dispatch

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests tqdm

      - name: Run downloader
        run: python scripts/download_ok.py

      - name: Check downloaded files
        id: check
        run: |
          COUNT=$(ls downloads/*.apk 2>/dev/null | wc -l || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -eq 0 ]; then
            echo "没有下载到 APK"
          fi

      - name: Push to Telegram
        if: steps.check.outputs.count != '0'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BOT_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
        run: |
          for file in downloads/*.apk; do
            echo "发送 $file"
            curl -s -X POST "$BOT_API_BASE/bot$BOT_TOKEN/sendDocument" \
              -F chat_id="$CHAT_ID" \
              -F caption="OK影视自动更新" \
              -F document=@"$file"
          done

      - name: Save timestamp
        if: steps.check.outputs.count != '0'
        run: |
          date > last_update.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_update.txt
          git commit -m "update ok影视" || true
          git push || true
