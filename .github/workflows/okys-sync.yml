name: OK影视自动更新

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Detect latest version folder
        run: |
          BASE_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/"

          echo "获取版本目录列表..."
          curl -s "$BASE_URL" -o list.html

          # 提取版本目录（例如 3.7.0）
          grep -oP '(?<=href=")[0-9]+\.[0-9]+\.[0-9]+(?=/")' list.html > versions.txt

          echo "发现版本目录："
          cat versions.txt

          LATEST_VERSION=$(sort -V versions.txt | tail -n 1)
          echo "最新版本目录：$LATEST_VERSION"

          echo "$LATEST_VERSION" > latest_version.txt
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Compare version
        run: |
          if [ -f last_version.txt ]; then
            LAST=$(cat last_version.txt)
            if [ "$LAST" = "$LATEST_VERSION" ]; then
              echo "版本未变化，退出。"
              exit 0
            fi
          fi

      - name: Fetch APK list
        run: |
          VERSION_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$LATEST_VERSION/"
          mkdir -p downloads

          echo "获取 APK 列表..."
          curl -s "$VERSION_URL" -o list.html

          grep -oP '(?<=href=")[^"]+\.apk' list.html > apk_list.txt

          grep -E "海信专版|leanback-arm64_v8a|leanback-armeabi_v7a|mobile-arm64_v8a|mobile-armeabi_v7a" apk_list.txt > final_list.txt

          echo "最终 APK 列表："
          cat final_list.txt

      - name: Download APK files
        run: |
          VERSION_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/OK%E5%BD%B1%E8%A7%86%E6%A0%87%E5%87%86%E7%89%88/$LATEST_VERSION/"
          cd downloads

          while read -r file; do
            echo "下载 $file"
            wget -q "${VERSION_URL}${file}"
          done < ../final_list.txt

      - name: Fetch changelog
        run: |
          CHANGELOG_URL="https://op.ll.dovx.cf/OK%E5%BD%B1%E8%A7%86/update.txt"
          curl -s "$CHANGELOG_URL" -o update.txt || echo "无更新日志"

      - name: Upload to Telegram
        env:
          TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd downloads

          MESSAGE="📢 OK影视 新版本发布\n版本：${LATEST_VERSION}\n\n更新日志：\n$(cat ../update.txt 2>/dev/null || echo '无')"

          curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHANNEL_ID" \
            -d text="$MESSAGE"

          for f in *.apk; do
            curl -s -X POST "$TELEGRAM_API_BASE/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHANNEL_ID" \
              -F document=@"$f" \
              -F caption="$f"
          done

      - name: Save new version
        run: |
          cp latest_version.txt last_version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version.txt
          git commit -m "更新版本号到 $LATEST_VERSION" || echo "无变更"
          git push || echo "无需推送"
